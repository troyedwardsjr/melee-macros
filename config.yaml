# Fox macro system configuration.
#
# This program is the SOLE input source Dolphin sees: set your Dolphin GCN port
# to the pipe device (Controllers -> Port 1 -> "Standard Controller" config ->
# device dropdown -> Pipe/0/<name>). Your physical pad is read here via SDL and
# passed through, except when a trigger fires a macro.

# --- output -----------------------------------------------------------------
# Leave pipe_path blank to auto-detect the Slippi/Dolphin Pipes dir on macOS.
# Detected on this machine: the Slippi Launcher netplay Dolphin user dir.
pipe_path: "~/Library/Application Support/com.project-slippi.dolphin/netplay/User/Pipes/slippibot"
fps: 60
backend: hybrid         # "pipe" (you launch Dolphin, no state), "hybrid" (you
                        #  launch Dolphin + read-only state mirror for reactive
                        #  macros/auto-edgeguard), or "libmelee" (tool launches
                        #  Dolphin, frame-accurate). hybrid reuses libmelee.dolphin_path.
passthrough: true       # forward physical inputs when no macro is active

# --- closed-loop / state reading --------------------------------------------
# These only have teeth with `backend: libmelee` (install it: `uv sync --extra
# libmelee`). In pipe mode there is no game state, so macros use fixed timing
# and every `requires:` gate below is best-effort allowed (nothing is blocked).
#   reactive: prefer state-aware macros (real-landing L-cancel, wavedash that
#             waits for the airborne frame) over fixed timelines when state is
#             available. Harmless to leave on in pipe mode.
#   reactive_edgeguard: let the engine READ THE OPPONENT and auto-pick an
#             edgeguard (autopilot / bot-like). Off by default — opt in only if
#             you want the program making reads for you.
reactive: true
reactive_edgeguard: true

# Frame-accurate backend (only used when backend: libmelee). Requires `pip install melee`.
# Paths below were detected from your Slippi Launcher settings.
libmelee:
  dolphin_path: "~/Library/Application Support/Slippi Launcher/netplay"   # contains "Slippi Dolphin.app"
  iso_path: "/Volumes/Crucial X10/CrossOver/ROMS/Super Smash Bros. Melee (USA) (EnJa) (Rev 2)/Super Smash Bros. Melee (USA) (En,Ja) (Rev 2).iso"
  port: 1

# --- physical controller ----------------------------------------------------
# Real Nintendo GameCube controller via a Mayflash adapter (PC/DInput mode).
# SDL/pygame CANNOT read this adapter on macOS (it enumerates with 0 axes /
# 0 buttons), so we read its raw HID reports directly (driver: hid_gc). Use
# driver "sdl" for a normal pad (Xbox/Switch Pro/etc.). Calibrated values below
# come from `uv run --with hidapi python hidprobe.py`. Logical names: the GC
# buttons A B X Y Z L R START D_UP D_DOWN D_LEFT D_RIGHT pass through to the
# game; MOD is a macro-only modifier (never sent to the game).
controller:
  driver: hid_gc
  hid_vendor: 0x0079    # Mayflash adapter in PC mode (DragonRise). 0x057E = Wii U mode.
  hid_interface: 0      # which adapter PORT your controller is plugged into (0-3)
  deadzone: 0.15
  # HID report BYTE index per axis. Stick bytes rest at 0x80 (center); trigger
  # bytes rest at 0x00. Rest report: 00 00 80 80 80 80 00 00 08.
  axes:
    main_x: 2
    main_y: 3
    c_x: 5
    c_y: 4
    l_trigger: 6
    r_trigger: 7
  invert:
    main_y: true        # stick UP reads low; flip so up = 1.0 (pipe convention)
    c_y: true
  # "byte.bit" -> logical GameCube button (calibrated).
  buttons:
    "0.1": A
    "0.2": B
    "0.0": X
    "0.3": Y
    "0.7": MOD          # Z button is the macro modifier (never sent to the game).
                        #  A GameCube controller has no spare button, so Z was
                        #  chosen as MOD; physical grab is replaced by the
                        #  MOD+A "jc_grab" macro. To get raw Z/grab back, change
                        #  this to "0.7": Z (and pick another button for MOD).
    "1.1": START
  hat_byte: 8           # D-pad hat nibble (low nibble of byte 8; 8 = neutral)
  # LEFT TRIGGER as a SECOND modifier. You shield with the RIGHT trigger, and
  # the adapter's L is just a clone of R, so we repurpose L: a soft press past
  # l_mod_threshold (0..1 of the analog pull) becomes the macro-only button
  # "L_MOD" (never sent to the game), and its analog value is zeroed so it
  # won't airdodge/shield. This gives you a whole second bank of macros
  # (see the L_MOD triggers below) without losing R-shield.
  l_mod_name: L_MOD
  l_mod_threshold: 0.3

# --- triggers ---------------------------------------------------------------
# Each entry fires its macro on the rising edge of its condition. A condition is
# any mix of held buttons (`buttons:`/`hold:`) and an optional main-stick
# direction (`stick: left|right|up|down`). More-specific bindings win, so
# "MOD + stick" beats a bare D-pad press. MOD = the Z button (a macro-only
# modifier, never sent to the game — see the controller buttons map above).
triggers:
  # bank 1: MOD (hold Z) + MAIN-STICK DIRECTION — movement & approach
  #   left/right = wavedash; up = jump-in aerial; down = drill pressure.
  #   (shine & firefox dropped here — you hit those clean by hand.)
  - { hold: MOD, stick: right, macro: wavedash_forward }
  - { hold: MOD, stick: left,  macro: wavedash_back }
  - { hold: MOD, stick: up,    macro: shffl_nair }     # "quick jump + kick" approach
  - { hold: MOD, stick: down,  macro: drillshine }      # SH dair -> shine pressure

  # bank 2: MOD (hold Z) + face button — shine game, kills, grab
  - { buttons: [MOD, A], macro: jc_grab }               # standing JC grab
  - { buttons: [MOD, B], macro: multishine }            # 6-shine string
  - { buttons: [MOD, X], macro: shffl_fair }            # spacing / kill aerial
  - { buttons: [MOD, Y], macro: waveshine_forward }     # shine -> wavedash pressure
  # shine_oos (out-of-shield shine punish) used to live on MOD+Z, but Z is now
  # MOD itself, so that combo is gone. It's an easy hand tech (jump OOS + shine),
  # so it's unbound. To rebind it, give it a free combo, e.g.:
  #   - { buttons: [MOD, A], stick: down, macro: shine_oos, requires: shielding }
  # (MOD+A+down beats MOD+A=jc_grab by specificity). Avoid MOD+START: if the
  # `requires` gate fails, START leaks through and PAUSES the game.

  # bank 3: MOD (hold Z) + D-PAD — kills, juggles, recovery
  - { buttons: [MOD, D_UP],    macro: upthrow_uair, requires: holding_grab }  # grab -> uair kill confirm
  - { buttons: [MOD, D_DOWN],  macro: shffl_dair }          # drill (no auto-shine)
  - { buttons: [MOD, D_LEFT],  macro: ledgedash_stage_left }
  - { buttons: [MOD, D_RIGHT], macro: ledgedash_stage_right }

  # ===========================================================================
  # LEFT-TRIGGER (L_MOD) BANK — a second moveset: lasers, movement & recovery.
  # Hold the LEFT trigger (soft press is enough; see l_mod_name above). L_MOD is
  # a different "shift key" from MOD(Z), so none of these conflict with the Z
  # bank above. Mnemonic: Z = pressure/shine/kills, L = neutral/movement/laser.
  # ===========================================================================

  # bank 4: L_MOD + MAIN-STICK DIRECTION — SHORT-HOP LASERS ("jump + shoot")
  #   This is the move you asked for: jump and blaster nearly together, fired
  #   on the first airborne frame so the laser stays low, then fast-fall.
  - { hold: L_MOD, stick: up,    macro: shl }            # neutral SHL (hop straight up + laser)
  - { hold: L_MOD, stick: right, macro: shl_approach }   # drift-forward SHL (approach)
  - { hold: L_MOD, stick: left,  macro: shl_retreat }    # drift-back SHL (retreat/space)
  - { hold: L_MOD, stick: down,  macro: shl_double }      # double laser (one full hop, two shots)

  # bank 5: L_MOD + face button — MOVEMENT TECH (the hard-to-time-by-hand stuff)
  - { buttons: [L_MOD, A], macro: moonwalk_right }
  - { buttons: [L_MOD, B], macro: moonwalk_left }
  - { buttons: [L_MOD, X], macro: pivot_right }
  - { buttons: [L_MOD, Y], macro: pivot_left }

  # bank 6: L_MOD + D-PAD — PUNISH & PRESSURE (Fox's bread-and-butter, OOS +
  # the key aerials). Firefox/recovery lived here before; swapped out because
  # you've got recovery covered. These four are competitive staples that aren't
  # bound anywhere else (the Z bank only has nair/fair/dair + forward waveshine).
  - { buttons: [L_MOD, D_UP],    macro: shffl_uair }                      # juggle / vertical-kill up-air
  - { buttons: [L_MOD, D_DOWN],  macro: shine_oos, requires: shielding }  # out-of-shield shine — the premier OOS punish
  - { buttons: [L_MOD, D_LEFT],  macro: shffl_bair }                      # spacing / edgeguard / kill back-air
  - { buttons: [L_MOD, D_RIGHT], macro: waveshine_back }                  # retreating waveshine (pairs with MOD+Y forward)

  # --- EDGEGUARDS (optional) -------------------------------------------------
  # All banks above are full, so these are commented out — uncomment and pick
  # physical inputs you have free (or replace a binding above). The aimable ones
  # work in BOTH pipe and libmelee mode (you aim yourself). The reactive one
  # needs `backend: libmelee` AND `reactive_edgeguard: true` (it reads the
  # opponent and acts on its own).
  #
  #   Aimable / fixed (you position next to the ledge, then fire):
  # - { buttons: [MOD, B], stick: right, macro: offstage_bair_right }  # ex: needs a free input
  # - { buttons: [MOD, B], stick: left,  macro: offstage_bair_left }
  # - { ..., macro: offstage_dair_right }   # SH dair spike straight down
  # - { ..., macro: ledgehog_right }        # walk off to grab the ledge (deny recovery)
  # - { ..., macro: shine_spike_right }     # HIGH RISK: hop out, shine-spike, firefox back
  #
  #   Reactive autopilot (reads opponent; only with libmelee + reactive_edgeguard:true):
  # - { ..., macro: reactive_edgeguard }
